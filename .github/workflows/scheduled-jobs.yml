name: Neiro Scheduled Jobs

# GitHub Actions cron (UTC) → Railway backend API を叩いてジョブを実行
# Railwayがスリープしていてもリクエストで起動する

on:
  schedule:
    # Bio-Digital レポート: 月曜 09:00 JST = 日曜 24:00 UTC = 月曜 00:00 UTC
    - cron: "0 0 * * 1"
    # DX リサーチレポート: 火曜 09:00 JST = 火曜 00:00 UTC
    - cron: "0 0 * * 2"
    # X 投稿: 月水金 13:00 JST = 04:00 UTC
    - cron: "0 4 * * 1,3,5"
    # MA° LINE スタンプ生成: 木曜 10:00 JST = 01:00 UTC
    - cron: "0 1 * * 4"
    # 電子書籍出版: 土曜 09:00 JST = 00:00 UTC
    - cron: "0 0 * * 6"
    # Instagram 投稿: 毎日 12:00 JST = 03:00 UTC
    - cron: "0 3 * * *"
    # YouTube Shorts (睡眠): 月曜 21:00 JST = 12:00 UTC
    - cron: "0 12 * * 1"
    # YouTube Shorts (集中): 水曜 08:00 JST = 火曜 23:00 UTC
    - cron: "0 23 * * 2"
    # YouTube Shorts (瞑想): 金曜 06:00 JST = 木曜 21:00 UTC
    - cron: "0 21 * * 4"
  workflow_dispatch:
    inputs:
      job_type:
        description: "実行するジョブタイプ"
        required: true
        type: choice
        options:
          - bio_report
          - dx_report
          - x_weekly_post
          - line_sticker
          - weekly_ebook
          - instagram_daily
          - youtube_sleep_shorts
          - youtube_focus_shorts
          - youtube_meditation_shorts

jobs:
  dispatch-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determine job type from schedule
        id: resolve
        run: |
          # workflow_dispatch の場合は入力値を使う
          if [ -n "${{ github.event.inputs.job_type }}" ]; then
            echo "job_type=${{ github.event.inputs.job_type }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # cron スケジュールから job_type を判定
          CRON="${{ github.event.schedule }}"
          DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)

          case "$CRON" in
            "0 0 * * 1")   echo "job_type=bio_report" >> "$GITHUB_OUTPUT" ;;
            "0 0 * * 2")   echo "job_type=dx_report" >> "$GITHUB_OUTPUT" ;;
            "0 4 * * 1,3,5") echo "job_type=x_weekly_post" >> "$GITHUB_OUTPUT" ;;
            "0 1 * * 4")   echo "job_type=line_sticker" >> "$GITHUB_OUTPUT" ;;
            "0 0 * * 6")   echo "job_type=weekly_ebook" >> "$GITHUB_OUTPUT" ;;
            "0 3 * * *")   echo "job_type=instagram_daily" >> "$GITHUB_OUTPUT" ;;
            "0 12 * * 1")  echo "job_type=youtube_sleep_shorts" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * 2")  echo "job_type=youtube_focus_shorts" >> "$GITHUB_OUTPUT" ;;
            "0 21 * * 4")  echo "job_type=youtube_meditation_shorts" >> "$GITHUB_OUTPUT" ;;
            *)             echo "job_type=unknown" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Trigger job on Railway backend
        if: steps.resolve.outputs.job_type != 'unknown'
        env:
          API_BASE: ${{ secrets.AI_COMPANY_API_BASE }}
          API_KEY: ${{ secrets.AI_COMPANY_AUTOMATION_API_KEY }}
          JOB_TYPE: ${{ steps.resolve.outputs.job_type }}
        run: |
          set -euo pipefail

          echo "🚀 Triggering job: ${JOB_TYPE}"

          PAYLOAD=$(cat <<PEOF
          {"job_type": "${JOB_TYPE}", "job_config": {}}
          PEOF
          )

          RESPONSE=$(curl --fail --show-error --silent --max-time 120 \
            -X POST "${API_BASE%/}/api/dispatch/run-now" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${API_KEY}" \
            --data "${PAYLOAD}")

          echo "✅ Response: ${RESPONSE}"
