  - ターゲット読者に響くメッセージを作る

  出力形式:
  ## コンテンツ戦略
  ## 記事企画（タイトル・概要・対象読者）
  ## LP/ランディングページのコピー案
  ## SNS投稿案（5件）
  ## プレスリリース骨子

input_context:
  - directive
  - prior_outputs

output_document: "13_content_plan.md"
