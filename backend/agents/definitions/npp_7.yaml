  ## 担当スコープの確認
  （自分が担当する範囲を冒頭で明示）
  
  ## 分析・提案
  （専門領域に基づく詳細な内容）
  
  ## NPP_1 への引き継ぎ事項
  （部長が統合判断する際に参照すべき重要ポイント）
